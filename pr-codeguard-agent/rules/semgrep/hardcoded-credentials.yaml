rules:
  - id: hardcoded-password-variable
    pattern: |
      $VAR = "$PASS"
    metavariable-regex:
      metavariable: $VAR
      regex: (?i).*(password|passwd|pwd|secret).*
    message: "Potential hardcoded credential detected."
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
    metadata:
      category: security

  - id: python-debug-enabled
    pattern: app.run(debug=True)
    message: "Debug mode enabled in production. Disable debug mode."
    severity: WARNING
    languages:
      - python
    metadata:
      category: security
